name: Sourcing worker

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: sourcing-worker
  cancel-in-progress: false

jobs:
  worker:
    name: Process sourcing job queue
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run worker (max 10 jobs)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SOURCING_REVALIDATE_URL: ${{ secrets.SOURCING_REVALIDATE_URL }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
          SOURCING_MIN_SCORE: ${{ vars.SOURCING_MIN_SCORE }}
          SOURCING_NOTIFY_WEBHOOK_URL: ${{ secrets.SOURCING_NOTIFY_WEBHOOK_URL }}
        run: node --require ./scripts/register-server-only-stub.cjs ./node_modules/tsx/dist/cli.mjs scripts/sourcing-worker.ts --max=10
