name: Sourcing hebdomadaire

on:
  schedule:
    # Tous les lundis à 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: sourcing
  cancel-in-progress: false

jobs:
  source:
    name: Sourcing IA -> Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run sourcing cron (pays depuis Supabase)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SOURCING_REVALIDATE_URL: ${{ secrets.SOURCING_REVALIDATE_URL }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
          SOURCING_MIN_SCORE: ${{ vars.SOURCING_MIN_SCORE }}
        run: node --require ./scripts/register-server-only-stub.cjs ./node_modules/tsx/dist/cli.mjs scripts/sourcing-cron.ts
